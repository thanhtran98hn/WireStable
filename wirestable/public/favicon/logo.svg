<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Coral to light golden coral) -->
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b4a" />
      <stop offset="100%" stop-color="#ffa38a" />
    </linearGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#ff6b4a" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Outer background rounded rectangle -->
  <rect width="512" height="512" rx="128" fill="url(#coralGrad)" />
  
  <!-- Sleek geometric inner card to give depth (glassmorphic inset border) -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.2" />

  <!-- Monogram text with Georgia/Serif fallbacks -->
  <text x="256" y="325" 
        font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif" 
        font-size="240" 
        font-weight="700" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="-12">W$</text>
</svg>